<!DOCTYPE html>
<html>
<head>
    <title>ReGaL-AI Legal Assistant</title>
</head>
<body>
    <h1>ReGaL-AI Legal Assistant</h1>

    <h2>Ask a Legal Question</h2>
    <form method="POST">
        <input type="hidden" name="action" value="question">
        <textarea name="question" rows="4" cols="50" placeholder="Type your legal question here..." required></textarea><br>
        <button type="submit">Ask</button>
    </form>
    {% if answer %}
        <h3>Answer:</h3>
        <p>{{ answer }}</p>
    {% endif %}

    <hr>

    <h2>Summarize a Document</h2>
    <form method="POST">
        <input type="hidden" name="action" value="summary">
        <select name="doc_name" required>
            <option value="" disabled selected>Select a document</option>
            {% for doc in docs %}
                <option value="{{ doc }}">{{ doc }}</option>
            {% endfor %}
        </select><br><br>
        <button type="submit">Summarize</button>
    </form>
    {% if summary %}
        <h3>Summary:</h3>
        <p>{{ summary }}</p>
    {% endif %}

    {% if error %}
        <h3 style="color:red;">Error: {{ error }}</h3>
    {% endif %}
</body>
</html>
